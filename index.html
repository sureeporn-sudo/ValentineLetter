<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Input</title>

<style>
    :root{
      --bg1:#ffe3ef;
      --bg2:#ffd1e3;
      --card:#ffffffcc;
    }

    *{ box-sizing:border-box; }
   
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, var(--bg1), var(--bg2));
      padding: 24px;
    }

    .card{
      width: min(720px, 92vw);
      background: var(--card);
      border-radius: 28px;
      box-shadow: 0 18px 60px rgba(0,0,0,.12);
      padding: 48px 36px;
      text-align:center;
      backdrop-filter: blur(6px);
    }

    .hero-img{
      width: 140px;
      height: 140px;
      object-fit: contain;
      display:block;
      margin: 0 auto 26px;
      image-rendering: pixelated; /* ทำให้รูปพิกเซลคม */
    }

    h1{
      margin: 0 0 18px;
      font-size: clamp(26px, 4vw, 44px);
      font-weight: 800;
    }
     
    .form{
      display:flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 0;
    }

    .label{
      font-size: 18px;
      font-weight: 700;
      opacity: .85;
    }

    input{
      width: min(420px, 100%);
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,.08);
      outline: none;
      font-size: 16px;
      background: white;
    }

    input:focus{
      border-color: rgba(255, 70, 130, .55);
      box-shadow: 0 0 0 4px rgba(255, 70, 130, .15);
    }

    button{
      padding: 14px 20px;
      border: none;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      background: #ff3b7a;
      color: white;
      box-shadow: 0 10px 24px rgba(255, 59, 122, .28);
    }
    
    button:hover{ transform: translateY(-1px); }

    .hint{
      margin-top: 18px;
      opacity: .75;
      font-size: 14px;
    }
  </style>
</head>

<body>
<div class="card">
  <h1>TEXT HERE</h1>

      <img class="hero-img" src="/thinking.png" alt="emoji" />
      
  <form id="msgForm">
    <label for="msg">Message:</label>
    <input id="msg" name="msg" type="text" placeholder="Type your message here.." required />
    <button type="submit">Next</button>
  </form>

</div>

  <script>
    document.getElementById("msgForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const value = document.getElementById("msg").value;

      // encode เพื่อกันอักขระพิเศษพัง
      const url = "result.html?msg=" + encodeURIComponent(value);
      window.location.href = url;
    });
  </script>
</body>
</html>
